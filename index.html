<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: serif;
    background: #fff;
    color: #000;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 8px;
  }

  /* --- Row 1: Time+Location | Weather --- */
  #row1 {
    display: table;
    width: 100%;
    border-bottom: 2px solid #000;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }
  #row1-left, #row1-right {
    display: table-cell;
    vertical-align: middle;
  }
  #row1-left {
    width: 50%;
    padding-right: 10px;
    border-right: 1px solid #999;
  }
  #row1-right {
    width: 50%;
    padding-left: 10px;
  }

  /* Time */
  #clock {
    font-size: 64px;
    font-weight: bold;
    letter-spacing: 2px;
    text-align: center;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  #date-display {
    font-size: 22px;
    text-align: center;
    margin-top: 4px;
  }

  /* Location selector (under time) */
  #location-bar {
    text-align: center;
    margin-top: 8px;
    font-size: 16px;
  }
  #location-bar select {
    font-size: 16px;
    font-family: serif;
    padding: 3px 6px;
    border: 1px solid #999;
    background: #fff;
    max-width: 100%;
  }
  #location-bar input {
    font-size: 16px;
    font-family: serif;
    padding: 3px 6px;
    border: 1px solid #999;
    width: 120px;
  }
  #location-bar button {
    font-size: 16px;
    font-family: serif;
    padding: 3px 10px;
    border: 1px solid #999;
    background: #eee;
    cursor: pointer;
  }

  /* Weather (right side of row 1) */
  #location-name {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 2px;
  }
  #weather-icon { display: none; }
  #weather-temp {
    font-size: 56px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  #weather-desc {
    text-align: center;
    font-size: 22px;
    margin-bottom: 4px;
  }
  #weather-details {
    font-size: 17px;
    line-height: 1.5;
    text-align: center;
  }
  #weather-details span {
    display: block;
  }

  /* Forecast row (full width, below row 1) */
  #forecast-section {
    border-bottom: 2px solid #999;
    padding-bottom: 6px;
    margin-bottom: 8px;
  }
  .forecast-row {
    display: table;
    width: 100%;
    padding-top: 6px;
  }
  .forecast-day {
    display: table-cell;
    text-align: center;
    font-size: 16px;
    width: 20%;
  }
  .forecast-day .day-name { font-weight: bold; font-size: 17px; }
  .forecast-day .day-desc { font-size: 14px; color: #555; }
  .forecast-day .day-temp { font-size: 16px; }

  /* --- Row 2: Calendar | Photo --- */
  #row2 {
    display: table;
    width: 100%;
  }
  #row2-left, #row2-right {
    display: table-cell;
    vertical-align: top;
  }
  #row2-left {
    width: 58%;
    padding-right: 10px;
  }
  #row2-right {
    width: 42%;
    padding-left: 10px;
    vertical-align: middle;
  }

  /* Calendar */
  .section-title {
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #999;
    padding-bottom: 3px;
    margin-bottom: 6px;
  }
  #calendar table {
    width: 100%;
    border-collapse: collapse;
  }
  #calendar th {
    font-size: 17px;
    font-weight: bold;
    padding: 5px 2px;
    text-align: center;
    border-bottom: 1px solid #999;
  }
  #calendar td {
    text-align: center;
    padding: 6px 2px;
    font-size: 18px;
  }
  #calendar td.today {
    font-weight: bold;
    background: #000;
    color: #fff;
  }
  #calendar td.other-month {
    color: #bbb;
  }
  #cal-header {
    text-align: center;
    font-size: 19px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  /* Photo */
  #photo-section {
    text-align: center;
  }
  #photo-frame {
    width: 100%;
    overflow: hidden;
    background: #eee;
    border: 1px solid #999;
  }
  #photo-frame img {
    width: 100%;
    display: block;
    filter: grayscale(100%) contrast(1.2);
    -webkit-filter: grayscale(100%) contrast(1.2);
  }
  #photo-caption {
    font-size: 14px;
    font-style: italic;
    margin-top: 3px;
    color: #666;
  }

  /* Status bar */
  #status-bar {
    margin-top: 8px;
    font-size: 14px;
    color: #999;
    text-align: center;
    border-top: 1px solid #ccc;
    padding-top: 4px;
  }
</style>
</head>
<body>

<!-- Row 1: Time+Location | Weather -->
<div id="row1">
  <div id="row1-left">
    <div id="clock" onclick="toggleClockFormat()" title="Tap to toggle 12h / 24h">--:--</div>
    <div id="date-display">Loading...</div>
    <div id="location-bar">
      <select id="city-select" onchange="onCitySelect()">
        <option value="">-- Select City --</option>
        <option value="auto">Auto-detect</option>
        <option value="37.34,-121.89">San Jose</option>
        <option value="30.67,104.07">Chengdu</option>
        <option value="32.78,-96.80">Dallas</option>
        <option value="40.71,-74.01">New York</option>
        <option value="34.05,-118.24">Los Angeles</option>
        <option value="47.61,-122.33">Seattle</option>
        <option value="48.86,2.35">Paris</option>
        <option value="35.68,139.69">Tokyo</option>
        <option value="1.35,103.82">Singapore</option>
        <option value="custom">Other...</option>
      </select>
      <div id="custom-location" style="display:none; margin-top:4px;">
        <input id="custom-city" type="text" placeholder="City name">
        <button onclick="searchCity()">Go</button>
      </div>
    </div>
  </div>
  <div id="row1-right">
    <div id="location-name"></div>
    <div id="weather-icon"></div>
    <div id="weather-temp" onclick="toggleTempUnit()" title="Tap to toggle &deg;C / &deg;F">--&deg;</div>
    <div id="weather-desc">Loading...</div>
    <div id="weather-details">
      <span id="w-humidity">Humidity: --</span>
      <span id="w-wind">Wind: --</span>
      <span id="w-high-low">H: -- / L: --</span>
    </div>
  </div>
</div>

<!-- Forecast row (full width) -->
<div id="forecast-section">
  <div class="forecast-row" id="forecast-row"></div>
</div>

<!-- Row 2: Calendar | Photo -->
<div id="row2">
  <div id="row2-left">
    <div class="section-title">Calendar</div>
    <div id="calendar"></div>
  </div>
  <div id="row2-right">
    <div id="photo-section">
      <div id="photo-frame">
        <img id="photo-img" src="" alt="Photo">
      </div>
      <div id="photo-caption"></div>
    </div>
  </div>
</div>

<div id="status-bar">Last updated: --</div>

<script>
// ============================================================
// CONFIG - edit these to customize
// ============================================================
var PHOTO_ROTATE_MINUTES = 10;  // rotate photo every N minutes
var WEATHER_REFRESH_MINUTES = 30;
var CLOCK_REFRESH_SECONDS = 30; // e-ink doesn't need per-second updates

// ===================== HOW TO ADD YOUR OWN PHOTOS =====================
// 1. Drop image files into the "photos/" folder next to this HTML file.
// 2. Edit "photos/photos.json" to list them, e.g.:
//    [
//      { "filename": "vacation.jpg", "caption": "Vacation" },
//      { "filename": "sunset.jpg",   "caption": "Sunset"   }
//    ]
// 3. Reload the dashboard.
//
// If photos.json is missing or empty, the fallback Picsum photos below
// are used so the dashboard still has something to display.
// ======================================================================
var PHOTOS = [
  { url: "https://picsum.photos/id/10/600/300", caption: "Forest" },
  { url: "https://picsum.photos/id/29/600/300", caption: "Mountains" },
  { url: "https://picsum.photos/id/37/600/300", caption: "Cliffs" },
  { url: "https://picsum.photos/id/47/600/300", caption: "Lake" },
  { url: "https://picsum.photos/id/100/600/300", caption: "Ocean" },
  { url: "https://picsum.photos/id/129/600/300", caption: "Railway" },
  { url: "https://picsum.photos/id/167/600/300", caption: "Architecture" },
  { url: "https://picsum.photos/id/240/600/300", caption: "Sunset" }
];
var currentPhotoIndex = 0;

// ============================================================
// WMO Weather Code to text/symbol mapping
// ============================================================
var WMO_CODES = {
  0: { desc: "Clear" },
  1: { desc: "Clear" },
  2: { desc: "Partly Cloudy" },
  3: { desc: "Cloudy" },
  45: { desc: "Fog" },
  48: { desc: "Fog" },
  51: { desc: "Drizzle" },
  53: { desc: "Drizzle" },
  55: { desc: "Drizzle" },
  61: { desc: "Light Rain" },
  63: { desc: "Rain" },
  65: { desc: "Heavy Rain" },
  71: { desc: "Light Snow" },
  73: { desc: "Snow" },
  75: { desc: "Heavy Snow" },
  80: { desc: "Showers" },
  81: { desc: "Showers" },
  82: { desc: "Storms" },
  95: { desc: "Thunderstorm" },
  96: { desc: "Thunderstorm" },
  99: { desc: "Thunderstorm" }
};

function getWMO(code) {
  return WMO_CODES[code] || { desc: "Unknown" };
}

// ============================================================
// TIMEZONE — offset from UTC in seconds, set by weather API
// ============================================================
var utcOffsetSeconds = null; // null = use device local time

// Get a Date adjusted to the selected city's timezone
function getCityNow() {
  var now = new Date();
  if (utcOffsetSeconds === null) return now;
  // Convert to UTC, then apply the city's offset
  var utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utcMs + utcOffsetSeconds * 1000);
}

// ============================================================
// CLOCK
// ============================================================
var clockFormat = "12h"; // "12h" or "24h"
try {
  var savedFormat = localStorage.getItem("kindle_clock_format");
  if (savedFormat === "24h" || savedFormat === "12h") clockFormat = savedFormat;
} catch(e) {}

function formatTime(date) {
  var h = date.getHours();
  var m = date.getMinutes();
  var mStr = m < 10 ? "0" + m : m;
  if (clockFormat === "24h") {
    var hStr = h < 10 ? "0" + h : h;
    return hStr + ":" + mStr;
  }
  var ampm = h >= 12 ? "PM" : "AM";
  var h12 = h % 12 || 12;
  return h12 + ":" + mStr + " " + ampm;
}

function toggleClockFormat() {
  clockFormat = (clockFormat === "12h") ? "24h" : "12h";
  try { localStorage.setItem("kindle_clock_format", clockFormat); } catch(e) {}
  updateClock();
  updateStatus();
}

function updateClock() {
  var now = getCityNow();
  document.getElementById("clock").textContent = formatTime(now);

  var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
  document.getElementById("date-display").textContent =
    days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  var now = getCityNow();
  var year = now.getFullYear();
  var month = now.getMonth();
  var today = now.getDate();

  var months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];

  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var daysInPrev = new Date(year, month, 0).getDate();

  var html = '<div id="cal-header">' + months[month] + ' ' + year + '</div>';
  html += '<table><tr>';
  var dayNames = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  for (var i = 0; i < 7; i++) html += '<th>' + dayNames[i] + '</th>';
  html += '</tr><tr>';

  // Previous month filler
  for (var i = 0; i < firstDay; i++) {
    var d = daysInPrev - firstDay + 1 + i;
    html += '<td class="other-month">' + d + '</td>';
  }

  var cell = firstDay;
  for (var d = 1; d <= daysInMonth; d++) {
    var cls = (d === today) ? ' class="today"' : '';
    html += '<td' + cls + '>' + d + '</td>';
    cell++;
    if (cell % 7 === 0 && d < daysInMonth) html += '</tr><tr>';
  }

  // Next month filler
  var remaining = 7 - (cell % 7);
  if (remaining < 7) {
    for (var i = 1; i <= remaining; i++) {
      html += '<td class="other-month">' + i + '</td>';
    }
  }
  html += '</tr></table>';

  document.getElementById("calendar").innerHTML = html;
}

// ============================================================
// WEATHER (Open-Meteo, free, no API key)
// ============================================================
var tempUnit = "F"; // "F" or "C"
try {
  var savedTempUnit = localStorage.getItem("kindle_temp_unit");
  if (savedTempUnit === "F" || savedTempUnit === "C") tempUnit = savedTempUnit;
} catch(e) {}

var lastWeatherData = null;

function formatTemp(celsius, includeUnit) {
  var v = (tempUnit === "F") ? (celsius * 9 / 5 + 32) : celsius;
  return Math.round(v) + (includeUnit ? "°" + tempUnit : "°");
}

function toggleTempUnit() {
  tempUnit = (tempUnit === "F") ? "C" : "F";
  try { localStorage.setItem("kindle_temp_unit", tempUnit); } catch(e) {}
  if (lastWeatherData) displayWeather(lastWeatherData);
}

function fetchWeather(lat, lon) {
  var url = "https://api.open-meteo.com/v1/forecast?" +
    "latitude=" + lat + "&longitude=" + lon +
    "&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m" +
    "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
    "&wind_speed_unit=mph" +
    "&timezone=auto&forecast_days=5";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        displayWeather(data);
      } catch(e) {
        document.getElementById("weather-desc").textContent = "Error parsing weather";
      }
    }
  };
  xhr.onerror = function() {
    document.getElementById("weather-desc").textContent = "Weather unavailable";
  };
  xhr.send();
}

function displayWeather(data) {
  lastWeatherData = data;

  // Update timezone from API response
  if (typeof data.utc_offset_seconds !== "undefined") {
    utcOffsetSeconds = data.utc_offset_seconds;
    try { localStorage.setItem("kindle_utc_offset", utcOffsetSeconds); } catch(e) {}
    // Immediately update clock and calendar to new timezone
    updateClock();
    renderCalendar();
  }

  var current = data.current;
  var wmo = getWMO(current.weather_code);

  document.getElementById("weather-icon").textContent = "";
  document.getElementById("weather-temp").textContent = formatTemp(current.temperature_2m, true);
  document.getElementById("weather-desc").textContent = wmo.desc;
  document.getElementById("w-humidity").textContent = "Humidity: " + current.relative_humidity_2m + "%";
  document.getElementById("w-wind").textContent = "Wind: " + Math.round(current.wind_speed_10m) + " mph";

  var daily = data.daily;
  if (daily) {
    document.getElementById("w-high-low").textContent =
      "H: " + formatTemp(daily.temperature_2m_max[0]) + " / L: " + formatTemp(daily.temperature_2m_min[0]);

    // 5-day forecast — parse date manually for Kindle compatibility
    var forecastHtml = "";
    var dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    for (var i = 1; i < daily.time.length && i <= 5; i++) {
      // Parse "YYYY-MM-DD" manually to avoid Kindle Date parsing bugs
      var parts = daily.time[i].split("-");
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      var dayName = dayNames[d.getDay()];
      if (typeof dayName === "undefined") dayName = daily.time[i].substring(5);
      var fwmo = getWMO(daily.weather_code[i]);
      forecastHtml += '<div class="forecast-day">' +
        '<div class="day-name">' + dayName + '</div>' +
        '<div class="day-desc">' + fwmo.desc + '</div>' +
        '<div class="day-temp">' + formatTemp(daily.temperature_2m_max[i]) + '/' +
        formatTemp(daily.temperature_2m_min[i]) + '</div></div>';
    }
    document.getElementById("forecast-row").innerHTML = forecastHtml;
  }

  updateStatus();
}

// ============================================================
// LOCATION
// ============================================================
var savedLat = null;
var savedLon = null;
var savedCityName = "";

function saveLocation(lat, lon, name) {
  savedLat = lat;
  savedLon = lon;
  savedCityName = name;
  try {
    localStorage.setItem("kindle_lat", lat);
    localStorage.setItem("kindle_lon", lon);
    localStorage.setItem("kindle_city", name);
  } catch(e) {}
}

function loadSavedLocation() {
  try {
    var lat = localStorage.getItem("kindle_lat");
    var lon = localStorage.getItem("kindle_lon");
    var name = localStorage.getItem("kindle_city");
    var offset = localStorage.getItem("kindle_utc_offset");
    if (lat && lon) {
      savedLat = parseFloat(lat);
      savedLon = parseFloat(lon);
      savedCityName = name || "";
      if (offset !== null) utcOffsetSeconds = parseInt(offset, 10);
      return true;
    }
  } catch(e) {}
  return false;
}

function onCitySelect() {
  var sel = document.getElementById("city-select");
  var val = sel.value;
  var customEl = document.getElementById("custom-location");

  if (val === "custom") {
    customEl.style.display = "";
    return;
  }
  customEl.style.display = "none";

  if (val === "auto") {
    autoDetectLocation();
    return;
  }
  if (val === "") return;

  var parts = val.split(",");
  var lat = parseFloat(parts[0]);
  var lon = parseFloat(parts[1]);
  var name = sel.options[sel.selectedIndex].text;
  saveLocation(lat, lon, name);
  document.getElementById("location-name").textContent = name;
  fetchWeather(lat, lon);
}

function searchCity() {
  var city = document.getElementById("custom-city").value;
  if (!city) return;

  document.getElementById("weather-desc").textContent = "Searching...";

  var url = "https://geocoding-api.open-meteo.com/v1/search?name=" +
    encodeURIComponent(city) + "&count=1&language=en&format=json";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.results && data.results.length > 0) {
          var r = data.results[0];
          var name = r.name + (r.admin1 ? ", " + r.admin1 : "") + (r.country ? ", " + r.country : "");
          saveLocation(r.latitude, r.longitude, name);
          document.getElementById("location-name").textContent = name;
          document.getElementById("custom-location").style.display = "none";
          fetchWeather(r.latitude, r.longitude);
        } else {
          document.getElementById("weather-desc").textContent = "City not found";
        }
      } catch(e) {
        document.getElementById("weather-desc").textContent = "Search error";
      }
    }
  };
  xhr.send();
}

function autoDetectLocation() {
  if (navigator.geolocation) {
    document.getElementById("weather-desc").textContent = "Detecting location...";
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        saveLocation(pos.coords.latitude, pos.coords.longitude, "Current Location");
        document.getElementById("location-name").textContent = "Current Location";
        fetchWeather(pos.coords.latitude, pos.coords.longitude);
      },
      function(err) {
        document.getElementById("weather-desc").textContent = "Location denied";
        // Fall back to NYC
        saveLocation(40.71, -74.01, "New York (default)");
        document.getElementById("location-name").textContent = "New York (default)";
        fetchWeather(40.71, -74.01);
      },
      { timeout: 10000 }
    );
  } else {
    document.getElementById("weather-desc").textContent = "Geolocation not supported";
    saveLocation(40.71, -74.01, "New York (default)");
    document.getElementById("location-name").textContent = "New York (default)";
    fetchWeather(40.71, -74.01);
  }
}

function getLocationAndWeather() {
  if (savedLat !== null && savedLon !== null) {
    document.getElementById("location-name").textContent = savedCityName;
    fetchWeather(savedLat, savedLon);
  } else {
    autoDetectLocation();
  }
}

// ============================================================
// PHOTOS
// ============================================================
function loadPhotoManifest(callback) {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "photos/photos.json", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200 || xhr.status === 0) {
      try {
        var manifest = JSON.parse(xhr.responseText);
        if (manifest && manifest.length > 0) {
          PHOTOS = [];
          for (var i = 0; i < manifest.length; i++) {
            PHOTOS.push({
              url: "photos/" + manifest[i].filename,
              caption: manifest[i].caption || ""
            });
          }
          currentPhotoIndex = 0;
        }
      } catch(e) {}
    }
    if (callback) callback();
  };
  xhr.onerror = function() { if (callback) callback(); };
  xhr.send();
}

function rotatePhoto() {
  var photo = PHOTOS[currentPhotoIndex];
  var img = document.getElementById("photo-img");
  img.src = photo.url;
  document.getElementById("photo-caption").textContent = photo.caption;
  currentPhotoIndex = (currentPhotoIndex + 1) % PHOTOS.length;
}

// ============================================================
// STATUS
// ============================================================
function updateStatus() {
  document.getElementById("status-bar").textContent = "Last updated: " + formatTime(getCityNow());
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadSavedLocation();
  updateClock();
  renderCalendar();
  getLocationAndWeather();
  loadPhotoManifest(rotatePhoto);

  // Refresh intervals (kept slow for e-ink)
  setInterval(updateClock, CLOCK_REFRESH_SECONDS * 1000);
  setInterval(renderCalendar, 60 * 60 * 1000); // hourly
  setInterval(getLocationAndWeather, WEATHER_REFRESH_MINUTES * 60 * 1000);
  setInterval(rotatePhoto, PHOTO_ROTATE_MINUTES * 60 * 1000);
}

init();
</script>
</body>
</html>
